name: "🚀 Build & Publish Docker + Sync to Mirrors"

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

# 🚦 防止重复运行同一分支的任务
concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-docker:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest

    steps:
      - name: "📂 拉取源码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🛠️ 设置 QEMU (支持多平台构建)"
        uses: docker/setup-qemu-action@v3

      - name: "🏗️ 设置 Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔑 登录到 DockerHub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "📤 构建并推送 Docker 镜像"
        run: |
          USERNAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${USERNAME}/linuxcts:latest"
          echo "🚀 正在构建并推送镜像: $IMAGE"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t "$IMAGE" \
            --push .

  sync-mirrors:
    name: "🔁 Sync to Gitee & GitCode"
    runs-on: ubuntu-latest
    needs: publish-docker

    steps:
      - name: "🧹 清理 Gitee 工作目录"
        run: sudo rm -rf LinuxCTS.git

      - name: "🔄 同步至 Gitee"
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
        with:
          source-repo: git@github.com:muaimingjun/LinuxCTS.git
          destination-repo: git@gitee.com:muaimingjun/LinuxCTS.git
          args: --mirror --force

      - name: "🧹 清理 GitCode 工作目录"
        run: sudo rm -rf LinuxCTS.git

      - name: "🔄 同步至 GitCode"
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
        with:
          source-repo: git@github.com:muaimingjun/LinuxCTS.git
          destination-repo: git@gitcode.com:muaimingjun/LinuxCTS.git
          args: --mirror --force